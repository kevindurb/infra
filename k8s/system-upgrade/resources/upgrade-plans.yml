---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: server-plan
  namespace: system-upgrade
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: In
        values:
          - 'true'
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade:v1.33.0-k3s1@sha256:731734cde8199c37f78159f19e6b2cdef8170d4b1b1b023624d72c308b9964e7
  channel: https://update.k3s.io/v1-release/channels/stable

---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: agent-plan
  namespace: system-upgrade
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: DoesNotExist
  prepare:
    args:
      - prepare
      - server-plan
    image: rancher/k3s-upgrade:v1.33.0-k3s1@sha256:731734cde8199c37f78159f19e6b2cdef8170d4b1b1b023624d72c308b9964e7
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade:v1.33.0-k3s1@sha256:731734cde8199c37f78159f19e6b2cdef8170d4b1b1b023624d72c308b9964e7
  channel: https://update.k3s.io/v1-release/channels/stable
