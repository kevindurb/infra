---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: server-plan
  namespace: system-upgrade
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: In
        values:
          - 'true'
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade:v1.32.4-k3s1@sha256:680d2e69ca043e88644b1b22f9bcf073cfbea8fd8ab68113488e8df94ba21b0d
  channel: https://update.k3s.io/v1-release/channels/stable

---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: agent-plan
  namespace: system-upgrade
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: DoesNotExist
  prepare:
    args:
      - prepare
      - server-plan
    image: rancher/k3s-upgrade:v1.32.4-k3s1@sha256:680d2e69ca043e88644b1b22f9bcf073cfbea8fd8ab68113488e8df94ba21b0d
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade:v1.32.4-k3s1@sha256:680d2e69ca043e88644b1b22f9bcf073cfbea8fd8ab68113488e8df94ba21b0d
  channel: https://update.k3s.io/v1-release/channels/stable
