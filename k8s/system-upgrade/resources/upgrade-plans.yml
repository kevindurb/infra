---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: server-plan
  namespace: system-upgrade
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: In
        values:
          - 'true'
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade:v1.32.1-k3s1@sha256:92dc207c08ae53f63192222b792b0f15e11389a884c5dfee51111dcbd6ffb8c1
  channel: https://update.k3s.io/v1-release/channels/stable

---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: agent-plan
  namespace: system-upgrade
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: DoesNotExist
  prepare:
    args:
      - prepare
      - server-plan
    image: rancher/k3s-upgrade:v1.32.1-k3s1@sha256:92dc207c08ae53f63192222b792b0f15e11389a884c5dfee51111dcbd6ffb8c1
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade:v1.32.1-k3s1@sha256:92dc207c08ae53f63192222b792b0f15e11389a884c5dfee51111dcbd6ffb8c1
  channel: https://update.k3s.io/v1-release/channels/stable
